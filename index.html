    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

        :root{
            --paper:#e8e4d7;
            --paper-deep:#e1dccb;
            --ink:#1a1c22;
            --body:#2c2e35;
            --muted:#6d6a5d;
            --dim:#8f8b7c;
            --accent:#1f3a52;
            --accent-bright:#2b5679;
            --accent-tint:rgba(31,58,82,0.07);
            --rule:rgba(26,28,34,0.16);
            --rule-soft:rgba(26,28,34,0.09);
            --grid:rgba(31,58,82,0.05);
        }

        html{scroll-behavior:smooth}
        body{
            font-family:'Archivo',sans-serif;background:var(--paper);color:var(--body);
            line-height:1.72;font-size:1.02rem;-webkit-font-smoothing:antialiased;position:relative;
        }
        body::before{
            content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
            background-image:
                repeating-linear-gradient(to right,var(--grid) 0 1px,transparent 1px 96px),
                repeating-linear-gradient(to bottom,var(--grid) 0 1px,transparent 1px 96px);
        }
        body>*{position:relative;z-index:1}

        /* ---- nav ---- */
        nav{
            position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:baseline;
            padding:1.15rem clamp(1.25rem,5vw,3rem);background:rgba(232,228,215,0.9);
            backdrop-filter:blur(6px);border-bottom:1px solid var(--rule);
        }
        .nav-logo{font-family:'Fraunces',serif;font-weight:500;font-size:1.4rem;letter-spacing:-0.01em;text-decoration:none;color:var(--ink)}
        .nav-logo sup{font-family:'IBM Plex Mono',monospace;font-size:0.5rem;font-weight:500;letter-spacing:0.14em;color:var(--accent);vertical-align:super;margin-left:4px}
        .nav-right{display:flex;align-items:center;gap:1.9rem}
        .nav-links{display:flex;gap:1.6rem;list-style:none}
        .nav-links a{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
        .nav-links a:hover{color:var(--ink)}
        .nav-cta{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--paper);background:var(--ink);text-decoration:none;padding:0.5rem 1rem;transition:background .2s}
        .nav-cta:hover{background:var(--accent)}

        .wrap{max-width:1080px;margin:0 auto;padding:0 clamp(1.25rem,5vw,3rem)}

        /* ---- hero ---- */
        .hero{display:grid;grid-template-columns:1.15fr 0.85fr;gap:3.5rem;align-items:center;padding:5.5rem 0 4rem;border-bottom:2px solid var(--ink)}
        .plate{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);display:flex;gap:0.9rem;align-items:center;margin-bottom:1.5rem}
        .plate::after{content:'';flex:1;height:1px;background:var(--rule)}
        .hero h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(2.5rem,5.5vw,4rem);line-height:1.03;letter-spacing:-0.02em;color:var(--ink);max-width:14ch}
        .hero .standfirst{font-size:1.05rem;color:var(--muted);line-height:1.7;margin-top:1.5rem;max-width:48ch}
        .hero-actions{display:flex;flex-wrap:wrap;gap:1rem;align-items:center;margin-top:2.2rem}
        .btn-primary{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--paper);background:var(--ink);text-decoration:none;padding:0.9rem 1.7rem;transition:background .2s}
        .btn-primary:hover{background:var(--accent)}
        .btn-ghost{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid var(--rule);padding-bottom:3px;transition:color .2s,border-color .2s}
        .btn-ghost:hover{color:var(--ink);border-color:var(--accent)}

        /* hero index panel — the atlas "plate index" */
        .index-panel{border:1px solid var(--ink)}
        .index-head{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:0.9rem 1.25rem;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between}
        .index-row{padding:1.25rem}
        .index-row + .index-row{border-top:1px solid var(--rule-soft)}
        .index-row .rname{font-family:'Fraunces',serif;font-size:1.35rem;color:var(--ink);display:flex;align-items:baseline;gap:0.6rem;margin-bottom:0.4rem}
        .index-row .rname span{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--rule);padding:2px 7px}
        .index-row p{font-size:0.86rem;color:var(--muted);line-height:1.55}

        /* ---- sections (label rail + body) ---- */
        section{display:grid;grid-template-columns:160px 1fr;gap:2.5rem;padding:3.4rem 0;border-bottom:1px solid var(--rule-soft)}
        .sec-label{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);padding-top:0.5rem}
        .sec-label small{display:block;color:var(--dim);letter-spacing:0.1em;margin-top:0.35rem;font-size:0.66rem}
        .sec-body{max-width:62ch}
        .sec-body h2{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(1.5rem,3vw,2rem);line-height:1.12;letter-spacing:-0.01em;color:var(--ink);margin-bottom:1rem}
        .sec-body p{margin-bottom:1.1rem}
        .sec-body p:last-child{margin-bottom:0}
        .sec-body strong{color:var(--ink);font-weight:600}
        .sec-body em{font-family:'Fraunces',serif;font-style:italic;font-size:1.05em}

        .prog-name{font-family:'Fraunces',serif;font-size:1.25rem;color:var(--ink);display:flex;align-items:baseline;gap:0.6rem;margin:1.8rem 0 0.5rem}
        .prog-name span{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--rule);padding:2px 7px}

        /* numbered sequence (a real sequence, so numbering is meaningful) */
        .flow{margin-top:0.5rem}
        .flow-step{display:grid;grid-template-columns:36px 1fr;gap:1.1rem;padding:1.1rem 0;border-top:1px solid var(--rule-soft);align-items:start}
        .flow-step:first-child{border-top:none;padding-top:0}
        .flow-step .fn{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--accent);padding-top:0.15rem}
        .flow-step h3{font-family:'Archivo',sans-serif;font-size:0.98rem;font-weight:600;color:var(--ink);margin-bottom:0.25rem}
        .flow-step p{font-size:0.9rem;color:var(--muted);line-height:1.6;margin:0}

        .pub{border-top:1px solid var(--rule);margin-top:0.5rem}
